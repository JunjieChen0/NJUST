name: Code QA NJUST_AI

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, ready_for_review, synchronize]
        branches: [main]

permissions:
    contents: read

jobs:
    check-translations:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Verify all translations are complete
              run: node scripts/find-missing-translations.js

    knip:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run knip checks
              run: pnpm knip

    repository-hygiene:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Check repository hygiene and dependency policy seed
              run: pnpm syncpack:lint

    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Lint
              run: pnpm lint

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Check types
              run: pnpm check-types

    unit-test:
        name: platform-unit-test (${{ matrix.name }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      name: ubuntu-latest
                    - os: windows-latest
                      name: windows-latest
                    - os: macos-latest
                      name: macos-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Build types package
              run: pnpm --filter @njust-ai/types build
            - name: Run unit tests
              run: pnpm test
              env:
                NODE_OPTIONS: "--max-old-space-size=4096"

    e2e-test:
        name: e2e-test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Build types package
              run: pnpm --filter @njust-ai/types build
            - name: Run E2E tests
              run: xvfb-run -a pnpm --filter @njust-ai/vscode-e2e test:ci

    coverage:
        name: coverage (${{ matrix.name }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: src
                      command: pnpm test:coverage
                      files: ./coverage/src/coverage-final.json
                      flags: src
                    - name: prompt-engine
                      command: pnpm --filter @njust-ai/prompt-engine test:coverage
                      files: ./coverage/prompt-engine/coverage-final.json
                      flags: prompt-engine
                    - name: webview-ui
                      command: pnpm --filter @njust-ai/vscode-webview test:coverage
                      files: ./coverage/webview-ui/coverage-final.json
                      flags: webview-ui
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                fetch-depth: 0 # 获取完整历史用于 PR 比较
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Build types package
              run: pnpm --filter @njust-ai/types build
            - name: Run ${{ matrix.name }} tests with coverage
              run: ${{ matrix.command }}
              env:
                NODE_OPTIONS: "--max-old-space-size=4096"
            - name: Upload ${{ matrix.name }} coverage to Codecov
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
              with:
                token: ${{ secrets.CODECOV_TOKEN }}
                files: ${{ matrix.files }}
                flags: ${{ matrix.flags }}
                fail_ci_if_error: false
                verbose: true

    check-secrets:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Scan for secrets
              run: node scripts/check-secrets.mjs --all-files

    vulnerability-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run pnpm audit (high)
              run: pnpm audit --audit-level=high
            - name: Run pnpm audit (critical)
              run: pnpm audit --audit-level=critical
            - name: Run src package audit (high)
              run: cd src && pnpm audit --audit-level=high
            - name: Run src package audit (critical)
              run: cd src && pnpm audit --audit-level=critical

    circular-deps:
        name: circular-dependency-guard
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Check for circular dependencies between critical modules
              run: pnpm check:circular

    unsafe-any-gate:
        name: unsafe-any-gate
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Verify UnsafeAny / cast counts have not grown
              run: pnpm check:any-gate

    bundle-size:
        name: bundle-size-check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Build extension bundle (turbo handles deps)
              run: pnpm bundle
            - name: Check bundle size
              run: pnpm check:bundle-size

    inheritance-health:
        name: inheritance-health-check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Check inheritance health
              run: pnpm check:inheritance
